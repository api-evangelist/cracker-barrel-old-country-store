aid: cracker-barrel-old-country-store
name: Cracker Barrel Old Country Store
kind: company
description: >-
  Cracker Barrel Old Country Store, Inc. is an American chain of restaurants
  and gift shops with a Southern country theme, offering home-style meals and
  retail merchandise. Founded in 1969 and headquartered in Lebanon, Tennessee,
  Cracker Barrel operates roughly 656 restaurant and retail locations across 44
  U.S. states. No public API or developer portal is published; the company
  offers a consumer website, iOS and Android mobile ordering apps, To-Go and
  catering ordering, gift cards, and the Cracker Barrel Rewards loyalty program
  for guests.
